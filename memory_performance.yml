---
# memory_performance.yml
# Diagnóstico de performance de memória em hosts Windows
# Disparado via Semaphore, chamado pelo n8n quando a tag "playbook: memory_performance" chega do Zabbix
# (cobre alertas como "The Memory Pages/sec is too high")
#
# Uso:
#   ansible-playbook memory_performance.yml -e "target_host=INACOM-NUC-08"
#
# No Semaphore, configurar a Environment variable "target_host" (Variable Group "Webhook Vars")
# para receber o host_name vindo do payload do Zabbix (via n8n).

- name: Diagnóstico de performance de memória
  hosts: "{{ target_host }}"
  gather_facts: no

  tasks:

    # Passo 1 — RAM total e disponível
    - name: "Passo 1 - RAM total e disponível"
      ansible.windows.win_shell: |
        Get-CimInstance Win32_OperatingSystem |
        Select-Object TotalVisibleMemorySize, FreePhysicalMemory |
        ForEach-Object {
            [PSCustomObject]@{
                "RAM Total (GB)" = [math]::Round($_.TotalVisibleMemorySize / 1MB, 2)
                "RAM Livre (GB)" = [math]::Round($_.FreePhysicalMemory / 1MB, 2)
                "RAM Usada (%)"  = [math]::Round((1 - $_.FreePhysicalMemory / $_.TotalVisibleMemorySize) * 100, 1)
            }
        } | Format-Table -AutoSize | Out-String -Width 300
      register: passo1_ram_total

    - name: Mostrar resultado do Passo 1
      ansible.builtin.debug:
        msg: "{{ passo1_ram_total.stdout_lines }}"

    # Passo 2 — Top 10 processos que mais consomem RAM
    - name: "Passo 2 - Top 10 processos por consumo de RAM"
      ansible.windows.win_shell: |
        Get-Process | Sort-Object WorkingSet -Descending |
        Select-Object -First 10 Name,
            @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
            CPU |
        Format-Table -AutoSize | Out-String -Width 300
      register: passo2_top_ram

    - name: Mostrar resultado do Passo 2
      ansible.builtin.debug:
        msg: "{{ passo2_top_ram.stdout_lines }}"

    # Identificar (de forma automática) o processo que mais consome RAM, para o Passo 3
    # Isto substitui a necessidade de "substituir nome_do_processo manualmente" do script original
    - name: Identificar processo com maior consumo de RAM (para monitorização dinâmica)
      ansible.windows.win_shell: |
        (Get-Process | Sort-Object WorkingSet -Descending | Select-Object -First 1 -ExpandProperty Name)
      register: passo2b_top_processo

    - name: Definir variável do processo alvo
      ansible.builtin.set_fact:
        top_ram_process: "{{ passo2b_top_processo.stdout | trim }}"

    # Passo 3 — Monitorizar crescimento de RAM do processo identificado acima (2 minutos)
    # Adaptado do "while ($true)" original para um loop limitado (4 leituras de 30s = 2 min),
    # já que um loop infinito nunca terminaria numa execução automatizada
    - name: "Passo 3 - Monitorizar RAM do processo '{{ top_ram_process }}' (2 minutos)"
      ansible.windows.win_shell: |
        1..4 | ForEach-Object {
            Get-Process -Name "{{ top_ram_process }}" -ErrorAction SilentlyContinue |
            Select-Object Name,
                @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
                CPU
            Start-Sleep -Seconds 30
        } | Format-Table -AutoSize | Out-String -Width 300
      register: passo3_monitor_processo
      failed_when: false
      async: 300
      poll: 30

    - name: Mostrar resultado do Passo 3
      ansible.builtin.debug:
        msg: "{{ passo3_monitor_processo.stdout_lines | default(['(sem output - verificar execução assíncrona)']) }}"

    # Passo 4 — Diagnóstico específico do Kaspersky (avp)
    - name: "Passo 4 - Estado atual do Kaspersky (avp)"
      ansible.windows.win_shell: |
        $proc = Get-Process avp -ErrorAction SilentlyContinue
        if ($proc) {
            $proc | Select-Object Name, CPU, @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}}, Id |
            Format-Table -AutoSize | Out-String -Width 300
        } else {
            "Processo avp (Kaspersky) não encontrado em execução neste host."
        }
      register: passo4_avp_estado
      failed_when: false

    - name: Mostrar resultado do Passo 4 (estado)
      ansible.builtin.debug:
        msg: "{{ passo4_avp_estado.stdout_lines }}"

    # Passo 4b — Monitorizar avp por 2 minutos (só corre se o processo existir)
    - name: "Passo 4 - Monitorizar avp por 2 minutos"
      ansible.windows.win_shell: |
        $existe = Get-Process avp -ErrorAction SilentlyContinue
        if ($existe) {
            1..4 | ForEach-Object {
                Get-Process avp -ErrorAction SilentlyContinue |
                Select-Object Name,
                    @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
                    CPU
                Start-Sleep -Seconds 30
            } | Format-Table -AutoSize | Out-String -Width 300
        } else {
            "Processo avp não está em execução - monitorização ignorada."
        }
      register: passo4_avp_monitor
      failed_when: false
      async: 300
      poll: 30
      when: "'não encontrado' not in passo4_avp_estado.stdout"

    - name: Mostrar resultado do Passo 4 (monitorização)
      ansible.builtin.debug:
        msg: "{{ passo4_avp_monitor.stdout_lines | default(['Monitorização do avp ignorada - processo não estava em execução.']) }}"

    # Consolidar tudo num relatório em memória
    - name: Gerar relatório consolidado
      ansible.builtin.set_fact:
        full_report: |
          ================================================================
          DIAGNÓSTICO DE PERFORMANCE DE MEMÓRIA - {{ inventory_hostname }}
          Data: {{ lookup('pipe', 'date') }}
          ================================================================

          --- PASSO 1: RAM total e disponível ---
          {{ passo1_ram_total.stdout | default('Sem dados') }}

          --- PASSO 2: Top 10 processos por consumo de RAM ---
          {{ passo2_top_ram.stdout | default('Sem dados') }}

          --- PASSO 3: Monitorização do processo '{{ top_ram_process }}' (2 min) ---
          {{ passo3_monitor_processo.stdout | default('Sem dados') }}

          --- PASSO 4: Estado do Kaspersky (avp) ---
          {{ passo4_avp_estado.stdout | default('Sem dados') }}

          --- PASSO 4: Monitorização do avp (2 min) ---
          {{ passo4_avp_monitor.stdout | default('Ignorado - avp não estava em execução') }}

    - name: Mostrar relatório final (para Semaphore/n8n)
      ansible.builtin.debug:
        msg: "{{ full_report }}"

    - name: Retornar relatório como output do playbook
      ansible.builtin.set_fact:
        diagnostic_report: "{{ full_report }}"
