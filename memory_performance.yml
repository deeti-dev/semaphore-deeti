---
# memory_performance.yml
# Diagnóstico de performance de memória em hosts Windows
# Disparado via Semaphore, chamado pelo n8n quando a tag "playbook: memory_performance" chega do Zabbix
# (cobre alertas como "The Memory Pages/sec is too high")
#
# Uso:
#   ansible-playbook memory_performance.yml -e "target_host=PC-08"
#
# No Semaphore, configurar a Environment variable "target_host" (Variable Group "Webhook Vars")
# para receber o host_name vindo do payload do Zabbix (via n8n).
#
# Nota de design: o alerta "Pages/sec Too High" mede PAGINAÇÃO (troca RAM <-> disco sob
# pressão de memória), não apenas "quem usa mais RAM". Por isso este playbook mede o
# contador real por trás do alerta e identifica processos por Page Faults/sec, além do
# tradicional ranking por RAM (que serve de contexto, mas não é a causa direta).

- name: Diagnóstico de performance de memória
  hosts: "{{ target_host }}"
  gather_facts: no

  tasks:

    # Passo 1 — RAM total e disponível
    - name: "Passo 1 - RAM total e disponível"
      ansible.windows.win_shell: |
        Get-CimInstance Win32_OperatingSystem |
        Select-Object TotalVisibleMemorySize, FreePhysicalMemory |
        ForEach-Object {
            [PSCustomObject]@{
                "RAM Total (GB)" = [math]::Round($_.TotalVisibleMemorySize / 1MB, 2)
                "RAM Livre (GB)" = [math]::Round($_.FreePhysicalMemory / 1MB, 2)
                "RAM Usada (%)"  = [math]::Round((1 - $_.FreePhysicalMemory / $_.TotalVisibleMemorySize) * 100, 1)
            }
        } | Format-Table -AutoSize | Out-String -Width 300
      register: passo1_ram_total

    - name: Mostrar resultado do Passo 1
      ansible.builtin.debug:
        msg: "{{ passo1_ram_total.stdout_lines }}"

    # Passo 2 — Monitorizar o contador real por trás do alerta (Pages/sec), em tempo real
    # Isto confirma se a paginação está mesmo a acontecer agora, e com que intensidade
    # Nota: usamos Get-CimInstance (WMI) em vez de Get-Counter, porque o Get-Counter (API PDH)
    # é conhecido por falhar silenciosamente em sessões remotas via WinRM (limitação de
    # "double-hop"/token de rede). O CIM já está confirmado a funcionar neste ambiente
    # (é o mesmo mecanismo usado no disk_performance.yml).
    - name: "Passo 2 - Monitorizar Pages/sec em tempo real (2 minutos)"
      ansible.windows.win_shell: |
        1..8 | ForEach-Object {
            $c = Get-CimInstance Win32_PerfFormattedData_PerfOS_Memory
            [PSCustomObject]@{
                Hora        = (Get-Date).ToString("HH:mm:ss")
                "Pages/sec" = $c.PagesPersec
            }
            Start-Sleep -Seconds 15
        } | Format-Table -AutoSize | Out-String -Width 300
      register: passo2_pages_sec
      failed_when: false
      async: 300
      poll: 30

    - name: Mostrar resultado do Passo 2
      ansible.builtin.debug:
        msg: "{{ passo2_pages_sec.stdout_lines | default(['(sem output - verificar execução assíncrona)']) }}"

    # Passo 3 — Estado do ficheiro de paginação
    - name: "Passo 3 - Estado do ficheiro de paginação"
      ansible.windows.win_shell: |
        Get-CimInstance Win32_PageFileUsage |
        Select-Object Name,
            @{N="Alocado(MB)";E={$_.AllocatedBaseSize}},
            @{N="Uso Atual(MB)";E={$_.CurrentUsage}},
            @{N="Pico Uso(MB)";E={$_.PeakUsage}} |
        Format-Table -AutoSize | Out-String -Width 300
      register: passo3_pagefile
      failed_when: false

    - name: Mostrar resultado do Passo 3
      ansible.builtin.debug:
        msg: "{{ passo3_pagefile.stdout_lines | default(['Sem ficheiro de paginação configurado']) }}"

    # Passo 4 — Top 10 processos que mais consomem RAM (contexto geral)
    - name: "Passo 4 - Top 10 processos por consumo de RAM"
      ansible.windows.win_shell: |
        Get-Process | Sort-Object WorkingSet -Descending |
        Select-Object -First 10 Name,
            @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
            CPU |
        Format-Table -AutoSize | Out-String -Width 300
      register: passo4_top_ram

    - name: Mostrar resultado do Passo 4
      ansible.builtin.debug:
        msg: "{{ passo4_top_ram.stdout_lines }}"

    # Passo 5 — Top processos por Page Faults/sec (indicador mais direto da causa da paginação)
    # Excluímos processos ligados ao próprio WMI (WmiPrvSE, unsecapp) e ao subsistema de
    # segurança (lsass) porque o playbook faz muitas consultas Get-CimInstance seguidas,
    # o que "acorda" esses processos e infla artificialmente os seus valores - não é um
    # sinal real do host, é o próprio diagnóstico a medir-se a si mesmo.
    #
    # Nota: a tabela e o "processo alvo" para o Passo 6 vêm da MESMA consulta (uma única
    # chamada ao WMI). Antes eram duas consultas separadas em momentos diferentes, e como
    # estes contadores mudam a cada instante, o "top 1" podia divergir entre a tabela
    # mostrada e o processo realmente monitorizado a seguir.
    - name: "Passo 5 - Top processos por Page Faults/sec"
      ansible.windows.win_shell: |
        $procs = Get-CimInstance Win32_PerfFormattedData_PerfProc_Process |
            Where-Object {
                $_.Name -notin @('_Total','Idle') -and
                $_.Name -notmatch '^(WmiPrvSE|unsecapp|lsass)' -and
                $_.PageFaultsPersec -gt 0
            } |
            Sort-Object PageFaultsPersec -Descending | Select-Object -First 10 Name, PageFaultsPersec

        $procs | Select-Object Name, @{N="PageFaults/sec";E={$_.PageFaultsPersec}} |
            Format-Table -AutoSize | Out-String -Width 300

        if ($procs) {
            # Marcador interno para o Ansible extrair o processo alvo - removido do relatório final
            "TOP_PROCESS_MARKER::$($procs[0].Name -replace '#\d+$','')"
        }
      register: passo5_page_faults
      failed_when: false

    - name: Mostrar resultado do Passo 5
      ansible.builtin.debug:
        msg: "{{ passo5_page_faults.stdout_lines | default([]) | reject('match', '^TOP_PROCESS_MARKER::') | list }}"

    # Fallback: se o Page Faults/sec não devolver nada (ex: contadores indisponíveis),
    # usamos o processo com mais RAM (Passo 4) em vez de um valor fixo pouco útil
    - name: Identificar processo com mais RAM (fallback caso Page Faults falhe)
      ansible.windows.win_shell: |
        Get-Process | Sort-Object WorkingSet -Descending | Select-Object -First 1 -ExpandProperty Name
      register: passo5c_top_ram_processo
      failed_when: false

    - name: Definir variável do processo alvo
      ansible.builtin.set_fact:
        top_fault_process: >-
          {%- set marcador = passo5_page_faults.stdout | regex_search('TOP_PROCESS_MARKER::(.+)', '\\1') -%}
          {{ (marcador | first | trim) if marcador else (passo5c_top_ram_processo.stdout | trim) }}

    # Passo 6 — Monitorizar RAM/CPU do processo identificado acima (2 minutos)
    - name: "Passo 6 - Monitorizar processo '{{ top_fault_process }}' (2 minutos)"
      ansible.windows.win_shell: |
        1..4 | ForEach-Object {
            Get-Process -Name "{{ top_fault_process }}" -ErrorAction SilentlyContinue |
            Select-Object Name,
                @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
                CPU
            Start-Sleep -Seconds 30
        } | Format-Table -AutoSize | Out-String -Width 300
      register: passo6_monitor_processo
      failed_when: false
      async: 300
      poll: 30

    - name: Mostrar resultado do Passo 6
      ansible.builtin.debug:
        msg: "{{ passo6_monitor_processo.stdout_lines | default(['(sem output - verificar execução assíncrona)']) }}"

    # Passo 7 — Diagnóstico específico do Kaspersky (avp)
    - name: "Passo 7 - Estado atual do Kaspersky (avp)"
      ansible.windows.win_shell: |
        $proc = Get-Process avp -ErrorAction SilentlyContinue
        if ($proc) {
            $proc | Select-Object Name, CPU, @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}}, Id |
            Format-Table -AutoSize | Out-String -Width 300
        } else {
            "Processo avp (Kaspersky) não encontrado em execução neste host."
        }
      register: passo7_avp_estado
      failed_when: false

    - name: Mostrar resultado do Passo 7 (estado)
      ansible.builtin.debug:
        msg: "{{ passo7_avp_estado.stdout_lines }}"

    # Passo 7b — Monitorizar avp por 2 minutos (só corre se o processo existir)
    - name: "Passo 7 - Monitorizar avp por 2 minutos"
      ansible.windows.win_shell: |
        $existe = Get-Process avp -ErrorAction SilentlyContinue
        if ($existe) {
            $resultado = 1..4 | ForEach-Object {
                Get-Process avp -ErrorAction SilentlyContinue |
                Select-Object Name,
                    @{N="RAM(MB)";E={[math]::Round($_.WorkingSet/1MB,1)}},
                    CPU
                Start-Sleep -Seconds 30
            }
        } else {
            $resultado = "Processo avp não está em execução - monitorização ignorada."
        }
        $resultado | Format-Table -AutoSize | Out-String -Width 300
      register: passo7_avp_monitor
      failed_when: false
      async: 300
      poll: 30
      when: "'não encontrado' not in passo7_avp_estado.stdout"

    - name: Mostrar resultado do Passo 7 (monitorização)
      ansible.builtin.debug:
        msg: "{{ passo7_avp_monitor.stdout_lines | default(['Monitorização do avp ignorada - processo não estava em execução.']) }}"

    # Consolidar tudo num relatório em memória
    - name: Gerar relatório consolidado
      ansible.builtin.set_fact:
        full_report: |
          ================================================================
          DIAGNÓSTICO DE PERFORMANCE DE MEMÓRIA - {{ inventory_hostname }}
          Data: {{ lookup('pipe', 'date') }}
          ================================================================

          --- PASSO 1: RAM total e disponível ---
          {{ (passo1_ram_total.stdout | trim) if passo1_ram_total.stdout else 'Sem dados' }}

          --- PASSO 2: Pages/sec em tempo real (contador do alerta) ---
          {{ (passo2_pages_sec.stdout | trim) if passo2_pages_sec.stdout else 'Sem dados' }}

          --- PASSO 3: Ficheiro de paginação ---
          {{ (passo3_pagefile.stdout | trim) if passo3_pagefile.stdout else 'Sem dados' }}

          --- PASSO 4: Top 10 processos por RAM ---
          {{ (passo4_top_ram.stdout | trim) if passo4_top_ram.stdout else 'Sem dados' }}

          --- PASSO 5: Top processos por Page Faults/sec ---
          {{ (passo5_page_faults.stdout | regex_replace('\r?\n?TOP_PROCESS_MARKER::.*', '') | trim) if passo5_page_faults.stdout else 'Sem dados' }}

          --- PASSO 6: Monitorização do processo '{{ top_fault_process }}' (2 min) ---
          {{ (passo6_monitor_processo.stdout | trim) if passo6_monitor_processo.stdout else 'Sem dados' }}

          --- PASSO 7: Estado do Kaspersky (avp) ---
          {{ (passo7_avp_estado.stdout | trim) if passo7_avp_estado.stdout else 'Sem dados' }}

          --- PASSO 7: Monitorização do avp (2 min) ---
          {{ (passo7_avp_monitor.stdout | trim) if passo7_avp_monitor.stdout else 'Ignorado - avp não estava em execução' }}

    - name: Mostrar relatório final (para Semaphore/n8n)
      ansible.builtin.debug:
        msg: "{{ full_report }}"

    - name: Retornar relatório como output do playbook
      ansible.builtin.set_fact:
        diagnostic_report: "{{ full_report }}"
